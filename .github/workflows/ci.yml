name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — typecheck, lint, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: legacy
          POSTGRES_PASSWORD: legacy
          POSTGRES_DB: legacy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U legacy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://legacy:legacy@localhost:5432/legacy_test
      STORAGE_BACKEND: stub
      WEBHOOK_SECRET: test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Verify sharp native bindings (Linux CI)
        # Block scalar: the inline JS contains ": " sequences that break YAML plain
        # scalars — as an unquoted `run:` value this killed the whole workflow parse
        # (CI silently dead 2026-06-22 → 07-06, every run an instant "failure").
        run: |
          node -e "import('sharp').then(m => m.default({ create: { width: 1, height: 1, channels: 3, background: '#000' } }).webp().toBuffer()).then(() => console.log('sharp OK')).catch(e => { console.error('sharp FAILED:', e); process.exit(1); })"

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Run migrations (integration DB)
        run: npx tsx scripts/migrate.ts

      - name: Integration tests
        run: npm run test:integration

      - name: Dependency audit (SEC-P5-8)
        run: npm audit --audit-level=high

  dashboard:
    name: Dashboard — build + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Dependency audit (SEC-P5-8)
        run: npm audit --audit-level=high

  privacy-gate:
    name: Privacy gate — no coordinates in audit_log migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject coordinates in audit_log migrations
        # grep exits 1 (fail) if it finds a match. We invert with `!` so the
        # step fails when any migration touches audit_log with a coord column.
        run: |
          ! grep -rn --include="*.sql" \
            -E "(lat|lng|longitude|latitude|geohash)" \
            backend/migrations/ \
            | grep -i "audit_log"

      - name: Confirm location columns are not persisted in event/audit tables
        # Broader check: no migration creates a table with lat/lng columns that
        # isn't the memories table (which is allowed and expected).
        run: |
          # Find SQL files that add lat/lng columns to non-memories tables.
          # Allowed exceptions:
          #   0002_memories.sql    — the drop point (the one persisted location)
          #   0014_muted_zones.sql — user-configured notification-silence zones;
          #                          deliberate coordinates, not a movement log
          #                          (reviewed in the 2026-06-30 security audit)
          HITS=$(grep -rn --include="*.sql" \
            -E "^\s+(lat|lng)\s+(double|float|numeric|real)" \
            backend/migrations/ \
            | grep -v -e "0002_memories.sql" -e "0014_muted_zones.sql" || true)
          if [ -n "$HITS" ]; then
            echo "FAIL: coordinate columns found in unexpected migration:"
            echo "$HITS"
            exit 1
          fi
          echo "OK: no stray coordinate columns found."

  ios-modules:
    name: iOS modules — swift build + test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios/LegacyModules

    steps:
      - uses: actions/checkout@v4

      - name: SPM unit tests
        run: swift test

  ios-app:
    name: iOS app — simulator build
    # The host-side `swift test` above skips every `#if os(iOS)` file, so the app
    # target must be compiled for a real iOS destination or breakage ships silently.
    # main broke three times this way (see collab-log 2026-07-02 / 07-04 / 07-06).
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('ios/Legacy.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build app target (iOS Simulator)
        run: |
          xcodebuild \
            -project Legacy.xcodeproj \
            -scheme Legacy \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
